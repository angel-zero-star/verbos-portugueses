<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Green stripe (2/5) -->
  <rect width="360" height="600" fill="#006600"/>
  <!-- Red stripe (3/5) -->
  <rect x="360" width="540" height="600" fill="#FF0000"/>
  <!-- Yellow circle (armillary sphere base) -->
  <circle cx="360" cy="300" r="120" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <!-- Inner white circle -->
  <circle cx="360" cy="300" r="90" fill="#fff"/>
  <!-- Blue shield (center) -->
  <rect x="330" y="255" width="60" height="75" rx="4" fill="#003399"/>
  <!-- 5 white dots on blue shield (quinas) -->
  <circle cx="345" cy="270" r="7" fill="#fff"/>
  <circle cx="375" cy="270" r="7" fill="#fff"/>
  <circle cx="360" cy="285" r="7" fill="#fff"/>
  <circle cx="345" cy="300" r="7" fill="#fff"/>
  <circle cx="375" cy="300" r="7" fill="#fff"/>
  <!-- Red border around shield -->
  <rect x="327" y="252" width="66" height="81" rx="4" fill="none" stroke="#FF0000" stroke-width="5"/>
  <!-- Red dots around border (7 castles simplified as dots) -->
  <circle cx="327" cy="252" r="8" fill="#FF0000"/>
  <circle cx="393" cy="252" r="8" fill="#FF0000"/>
  <circle cx="327" cy="333" r="8" fill="#FF0000"/>
  <circle cx="393" cy="333" r="8" fill="#FF0000"/>
  <circle cx="360" cy="240" r="8" fill="#FF0000"/>
  <circle cx="360" cy="345" r="8" fill="#FF0000"/>
  <circle cx="310" cy="292" r="8" fill="#FF0000"/>
  <circle cx="410" cy="292" r="8" fill="#FF0000"/>
</svg>
